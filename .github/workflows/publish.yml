name: Publish to PyPI

on:
  push:
    branches: [main]
    paths:
      - 'tentacle/**'
      - 'pyproject.toml'
  
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry Run (Skip Upload)'
        type: boolean
        default: false

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    uses: ./.github/workflows/tests.yml
    secrets: inherit

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.REPO_DISPATCH_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install build tools
        run: pip install build twine
      
      - name: Get version
        id: version
        run: |
          VERSION=$(grep -oP '__version__\s*=\s*["\x27]\K[^"\x27]+' tentacle/__init__.py)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Exact-membership check: publish only if THIS version is absent
          # from PyPI. (Comparing against the latest release only re-entered
          # the publish path — and re-fired the bump_dev/registry dispatches —
          # whenever main held an older-but-published version. A transient
          # network failure falls through to publish=true, which is safe:
          # twine --skip-existing dedupes the upload.)
          if curl --fail --silent --output /dev/null "https://pypi.org/pypi/tentacletk/$VERSION/json"; then
            echo "v$VERSION already on PyPI"
            echo "publish=false" >> $GITHUB_OUTPUT
          else
            echo "publish=true" >> $GITHUB_OUTPUT
          fi

      - name: Build
        if: steps.version.outputs.publish == 'true'
        run: |
          python -m build --wheel
          python -m twine check dist/*
      
      - name: Verify Install
        if: steps.version.outputs.publish == 'true'
        # Install WITH dependencies: proves the wheel's pins resolve on PyPI
        # exactly as users will install them. Retries absorb index-propagation
        # lag when an upstream package published minutes earlier in the same
        # release cascade.
        run: |
          for attempt in 1 2 3; do
            if pip install dist/*.whl; then exit 0; fi
            if [ "$attempt" -lt 3 ]; then
              echo "Install attempt $attempt failed; retrying in 30s (index propagation lag?)"
              sleep 30
            fi
          done
          echo "::error::Wheel install (with dependencies) failed"
          exit 1

      - name: Publish
        if: steps.version.outputs.publish == 'true' && inputs.dry_run != true
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: python -m twine upload dist/* --skip-existing
      
      - name: Trigger dev bump
        if: steps.version.outputs.publish == 'true' && inputs.dry_run != true
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.REPO_DISPATCH_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type":"bump_dev","client_payload":{"package":"tentacle"}}'

      - name: Trigger API registry refresh
        if: steps.version.outputs.publish == 'true' && inputs.dry_run != true
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.REPO_DISPATCH_TOKEN }}" \
            https://api.github.com/repos/m3trik/m3trik/dispatches \
            -d '{"event_type":"refresh_api_registry","client_payload":{"package":"tentacle"}}'
      
      - name: Summary
        run: |
          if [ "${{ steps.version.outputs.publish }}" == "true" ]; then
            echo "Published tentacletk v${{ steps.version.outputs.version }}"
          else
            echo "v${{ steps.version.outputs.version }} already on PyPI"
          fi
