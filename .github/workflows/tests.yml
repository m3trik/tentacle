name: Tests

on:
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.REPO_DISPATCH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libopengl0 libxkbcommon0 libdbus-1-3 libfontconfig1 python3-tk

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest qtpy PySide6
          # --no-cache-dir + --upgrade forces a fresh resolution from PyPI
          # for in-house deps. pip's wheel cache otherwise can return a
          # stale upstream that lacks newly-shipped APIs.
          pip install --no-cache-dir --upgrade pythontk uitk mayatk
          pip install -e . --no-deps

      - name: Compile UI files (pyside6-uic)
        # _ui.py files are gitignored build artifacts. Generate them so
        # test_ui_integrity (which checks .ui <-> _ui.py pairing) and any
        # product code that imports compiled UI works in CI.
        run: |
          for ui in tentacle/ui/*.ui tentacle/ui/maya_menus/*.ui tentacle/ui/blender_menus/*.ui; do
            out="${ui%.ui}_ui.py"
            pyside6-uic "$ui" -o "$out"
          done
          echo "Compiled $(ls tentacle/ui/*_ui.py tentacle/ui/maya_menus/*_ui.py tentacle/ui/blender_menus/*_ui.py | wc -l) UI files"

      - name: Run tests
        id: tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          set +e
          OUTPUT=$(pytest --tb=short -v test/ 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"

          PASSED=$(echo "$OUTPUT" | grep -oP '\d+(?= passed)' || echo "0")
          FAILED=$(echo "$OUTPUT" | grep -oP '\d+(?= failed)' || echo "0")
          ERRORS=$(echo "$OUTPUT" | grep -oP '\d+(?= error)' || echo "0")
          PASSED=${PASSED:-0}
          FAILED=${FAILED:-0}
          ERRORS=${ERRORS:-0}

          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "errors=$ERRORS" >> $GITHUB_OUTPUT
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

      - name: Fail if tests failed
        if: steps.tests.outputs.exit_code != '0'
        run: exit 1

  parity:
    # Static Maya<->Blender parity gate. Every UI delta must be fixed or
    # ledgered in docs/parity_map.py — an UNTRIAGED delta exits 1. The
    # comparer lives in the m3trik repo and expects the monorepo layout
    # (tentacle/, mayatk/, blendertk/ as siblings of m3trik/), so the
    # sibling repos are checked out at dev alongside this one.
    # See docs/PARITY_PORTING_PLAN.md for the system overview.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: tentacle

      - uses: actions/checkout@v4
        with:
          repository: m3trik/mayatk
          ref: dev
          token: ${{ secrets.REPO_DISPATCH_TOKEN }}
          path: mayatk

      - uses: actions/checkout@v4
        with:
          repository: m3trik/blendertk
          ref: dev
          token: ${{ secrets.REPO_DISPATCH_TOKEN }}
          path: blendertk

      - uses: actions/checkout@v4
        with:
          repository: m3trik/m3trik
          ref: main
          token: ${{ secrets.REPO_DISPATCH_TOKEN }}
          path: m3trik

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Parity sweep (fix-or-ledger gate)
        # --write regenerates PARITY_SURFACE.md; the git diff then also
        # fails the job if the committed doc is stale.
        run: |
          python m3trik/scripts/compare_panel_surface.py --all --write
          git -C tentacle diff --exit-code -- docs/PARITY_SURFACE.md

      - name: Parity audit up-to-date
        # mtimes are meaningless in a fresh checkout, so skip the
        # mtime-based registry-freshness guard; --check still
        # content-diffs the committed PARITY_AUDIT.md.
        run: python m3trik/scripts/generate_parity_audit.py --check --allow-stale
